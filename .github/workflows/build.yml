name: Build TWRP

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - run: |
          sudo apt update && sudo apt install -y bc bison build-essential curl flex g++-multilib gcc-multilib git gnupg gperf libxml2-utils lzop pngcrush schedtool squashfs-tools xsltproc zip zlib1g-dev python3
          
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'
          
      - run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH
          
      - run: |
          mkdir twrp && cd twrp
          git config --global user.name "Build"
          git config --global user.email "build@local.com"
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp -b twrp-12.1
          repo sync -j4
          
      - run: |
          cd twrp
          git clone https://gitlab.com/simg2img/recovery_tree_cph2269 -b main device/alps/oppo6765
          
      - run: |
          cd twrp
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          lunch omni_oppo6765-eng
          make recoveryimage
          
      - uses: actions/upload-artifact@v4
        with:
          name: recovery
          path: twrp/out/target/product/oppo6765/*.img
