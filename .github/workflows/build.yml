name: Build AOSP Recovery Image

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

env:
  DEVICE_NAME: oppo6765
  BUILD_TYPE: eng

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Device Tree
      uses: actions/checkout@v4
      with:
        path: device/alps/${{ env.DEVICE_NAME }}

    - name: Setup Build Environment
      run: |
        sudo apt update
        sudo apt install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 libncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig python3 repo openjdk-11-jdk android-sdk-platform-tools-common

    - name: Download AOSP Source
      run: |
        mkdir -p aosp-source
        cd aosp-source
        repo init -u https://android.googlesource.com/platform/manifest -b android-11.0.0_r48 --depth=1
        mkdir -p .repo/local_manifests
        cat > .repo/local_manifests/device.xml << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <manifest>
          <remote name="github" fetch="https://github.com" />
          <project path="device/alps/oppo6765" name="twrpdtgen/android_device_alps_oppo6765" remote="github" revision="main" />
        </manifest>
        EOF
        repo sync -c --no-tags --no-clone-bundle -j$(nproc)

    - name: Set up Build Environment
      run: |
        cd aosp-source
        source build/envsetup.sh
        lunch omni_${{ env.DEVICE_NAME }}-${{ env.BUILD_TYPE }}

    - name: Build Recovery Image
      run: |
        cd aosp-source
        source build/envsetup.sh
        lunch omni_${{ env.DEVICE_NAME }}-${{ env.BUILD_TYPE }}
        make -j$(nproc) recoveryimage

    - name: Prepare Artifacts
      if: success()
      run: |
        cd aosp-source
        RECOVERY_IMG=$(find out/target/product/${{ env.DEVICE_NAME }} -name "recovery.img" | head -n 1)
        if [ -f "$RECOVERY_IMG" ]; then
          cp $RECOVERY_IMG recovery_${{ env.DEVICE_NAME }}.img
          echo "RECOVERY_FILE=recovery_${{ env.DEVICE_NAME }}.img" >> $GITHUB_ENV
        else
          echo "::error::Recovery image not found!"
          exit 1
        fi

    - name: Upload Recovery Image
      uses: actions/upload-artifact@v4
      with:
        name: recovery-${{ env.DEVICE_NAME }}
        path: aosp-source/recovery_${{ env.DEVICE_NAME }}.img
