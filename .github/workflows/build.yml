name: Build Kernel OPPO MT6765

on:
  workflow_dispatch:
    inputs:
      defconfig:
        description: Defconfig
        required: true
        default: oppo6765_defconfig
        type: choice
        options:
          - oppo6765_defconfig
          - oppo6765_21281_defconfig
          - oppo6765_20375_defconfig
          - oppo6762_21285_defconfig
          - oppo6779_defconfig
          - k62v1_64_bsp_defconfig
          - mediatek_debug_defconfig
      toolchain:
        description: Toolchain
        required: true
        default: gcc
        type: choice
        options:
          - gcc
          - clang
      build_modules:
        description: Build vendor modules
        required: true
        default: true
        type: boolean

env:
  ARCH: arm64
  CC: ${{ inputs.toolchain == 'gcc' && 'gcc' || 'clang' }}
  CROSS_COMPILE: ${{ inputs.toolchain == 'gcc' && 'aarch64-linux-gnu-' || 'aarch64-linux-androidkernel-' }}

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          repository: oppo-source/android_kernel_oppo_mt6765
          ref: oppo/mt6765_r_11.1.4_a16
          path: kernel

      - if: inputs.build_modules
        uses: actions/checkout@v4
        with:
          repository: oppo-source/android_kernel_modules_oppo_mt6765
          path: vendor-modules

      - run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev libncurses-dev python2 python3 file

      - if: inputs.toolchain == 'gcc'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - if: inputs.toolchain == 'clang'
        run: sudo apt-get install -y clang lld

      - name: Build kernel
        working-directory: kernel
        run: |
          make ${{ inputs.defconfig }}
          make -j$(nproc)

      - if: inputs.build_modules
        name: Build vendor modules
        working-directory: kernel
        run: |
          M="${{ github.workspace }}/vendor-modules/source/vendor/oppo_mt6765_modules"
          [ -d "$M" ] && make M="$M" -j$(nproc)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ inputs.defconfig }}-${{ inputs.toolchain }}
          path: |
            kernel/arch/arm64/boot/Image*
            kernel/arch/arm64/boot/dts/
            kernel/**/*.ko
            vendor-modules/**/*.ko
